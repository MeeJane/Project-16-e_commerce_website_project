{% extends 'buddybasket/base.html' %}
{% load static %}

{% block title %}Order Confirmation - BuddyBasket{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <!-- Success Animation Card -->
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="card-header bg-success text-white text-center py-4 border-0">
                    <div class="mb-3">
                        <i class="fas fa-check-circle fa-5x"></i>
                    </div>
                    <h2 class="fw-bold mb-2">Order Placed Successfully!</h2>
                    <p class="mb-0">Thank you for shopping with BuddyBasket</p>
                </div>

                <div class="card-body p-5" id="orderDetails">
                    <div class="text-center mb-4">
                        <div class="spinner-border text-primary" role="status" id="loadingSpinner">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                        <p class="text-muted mt-2" id="loadingText">Loading your order details...</p>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="d-flex justify-content-center gap-3 mt-4">
                <a href="{% url 'home' %}" class="btn btn-primary btn-lg px-5">
                    <i class="fas fa-home me-2"></i>Continue Shopping
                </a>
                <a href="{% url 'order_history' %}" class="btn btn-outline-primary btn-lg px-5">
                    <i class="fas fa-box me-2"></i>Track Order
                </a>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        // Get order_id from URL
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('order_id');

        if (orderId) {
            // Fetch order details from server
            fetch(`/get-order/${orderId}/`)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        displayOrderDetails(data.order);
                    } else {
                        showError();
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    showError();
                });
        } else {
            showError();
        }
    });

    function displayOrderDetails(order) {
        // Hide loading spinner
        document.getElementById('loadingSpinner').style.display = 'none';
        document.getElementById('loadingText').style.display = 'none';

        const orderDate = new Date(order.created_at).toLocaleDateString('en-IN', {
            year: 'numeric',
            month: 'long',
            day: 'numeric'
        });

        // Format payment method
        let paymentMethod = order.payment_method;
        if (paymentMethod === 'COD') paymentMethod = 'Cash on Delivery';

        // Build HTML with order details
        const orderHtml = `
            <div class="text-center mb-4">
                <div class="d-inline-block bg-light px-4 py-2 rounded-pill">
                    <i class="fas fa-check-circle text-success me-2"></i>
                    <span class="fw-bold">Order #${order.order_number}</span>
                </div>
            </div>
            
            <div class="row g-4">
                <div class="col-md-6">
                    <div class="bg-light p-4 rounded-3">
                        <h5 class="fw-bold mb-3">
                            <i class="fas fa-truck me-2 text-primary"></i>Shipping Address
                        </h5>
                        <p class="mb-2"><strong>${order.shipping_address.full_name}</strong></p>
                        <p class="mb-2">${order.shipping_address.address_line1}</p>
                        ${order.shipping_address.address_line2 ? `<p class="mb-2">${order.shipping_address.address_line2}</p>` : ''}
                        <p class="mb-2">${order.shipping_address.city}, ${order.shipping_address.state} - ${order.shipping_address.postal_code}</p>
                        <p class="mb-0"><strong>Phone:</strong> ${order.shipping_address.phone}</p>
                    </div>
                </div>
                
                <div class="col-md-6">
                    <div class="bg-light p-4 rounded-3">
                        <h5 class="fw-bold mb-3">
                            <i class="fas fa-credit-card me-2 text-primary"></i>Payment Details
                        </h5>
                        <p class="mb-2"><strong>Method:</strong> ${paymentMethod}</p>
                        <p class="mb-2"><strong>Date:</strong> ${orderDate}</p>
                        <p class="mb-2"><strong>Subtotal:</strong> ₹${order.subtotal.toLocaleString('en-IN')}</p>
                        <p class="mb-2"><strong>Shipping:</strong> ${order.shipping === 0 ? 'Free' : '₹' + order.shipping}</p>
                        <p class="mb-0 fw-bold text-primary"><strong>Total:</strong> ₹${order.total.toLocaleString('en-IN')}</p>
                    </div>
                </div>
            </div>
            
            <div class="alert alert-success mt-4 mb-0">
                <i class="fas fa-envelope me-2"></i>
                A confirmation email has been sent to your email address
            </div>
        `;

        document.getElementById('orderDetails').innerHTML = orderHtml;
    }

    function showError() {
        document.getElementById('loadingSpinner').style.display = 'none';
        document.getElementById('orderDetails').innerHTML = `
            <div class="text-center py-4">
                <i class="fas fa-exclamation-circle fa-4x text-warning mb-3"></i>
                <h4>Order not found</h4>
                <p class="text-muted mb-4">Please check your order history.</p>
                <a href="{% url 'order_history' %}" class="btn btn-primary">
                    <i class="fas fa-box me-2"></i>View My Orders
                </a>
            </div>
        `;
    }
</script>

<style>
    .bg-light {
        background-color: #f8f9fa !important;
    }

    .rounded-3 {
        border-radius: 0.5rem !important;
    }
</style>
{% endblock %}
