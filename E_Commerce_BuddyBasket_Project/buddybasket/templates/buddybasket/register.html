{% extends 'buddybasket/base.html' %}
{% load static %}

{% block title %}Register - BuddyBasket{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-7 col-xl-6">
            <!-- Register Card -->
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="card-header bg-primary text-white text-center py-4 border-0">
                    <h3 class="fw-bold mb-0">Create Account 🎉</h3>
                    <p class="mb-0 small">Join BuddyBasket today</p>
                </div>

                <div class="card-body p-4 p-xl-5">
                    <!-- Register Form -->
                    <form method="post" action="{% url 'register' %}" id="registerForm">
                        {% csrf_token %}

                        <div class="row">
                            <!-- First Name -->
                            <div class="col-md-6 mb-3">
                                <div class="form-floating">
                                    <input type="text" class="form-control" id="firstName" name="first_name"
                                        placeholder="First Name" required>
                                    <label for="firstName"><i class="fas fa-user me-2 text-primary"></i>First
                                        Name</label>
                                </div>
                            </div>

                            <!-- Last Name -->
                            <div class="col-md-6 mb-3">
                                <div class="form-floating">
                                    <input type="text" class="form-control" id="lastName" name="last_name"
                                        placeholder="Last Name" required>
                                    <label for="lastName"><i class="fas fa-user me-2 text-primary"></i>Last Name</label>
                                </div>
                            </div>
                        </div>

                        <!-- Username -->
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="username" name="username" placeholder="Username"
                                required>
                            <label for="username"><i class="fas fa-at me-2 text-primary"></i>Username</label>
                        </div>

                        <!-- Email -->
                        <div class="form-floating mb-3">
                            <input type="email" class="form-control" id="email" name="email"
                                placeholder="name@example.com" required>
                            <label for="email"><i class="fas fa-envelope me-2 text-primary"></i>Email address</label>
                        </div>

                        <!-- Phone (Optional) -->
                        <div class="form-floating mb-3">
                            <input type="tel" class="form-control" id="phone" name="phone" placeholder="Phone Number">
                            <label for="phone"><i class="fas fa-phone me-2 text-primary"></i>Phone Number
                                (Optional)</label>
                        </div>

                        <!-- Password -->
                        <div class="form-floating mb-3">
                            <input type="password" class="form-control" id="password" name="password"
                                placeholder="Password" required>
                            <label for="password"><i class="fas fa-lock me-2 text-primary"></i>Password</label>
                            <button type="button"
                                class="btn btn-sm btn-link position-absolute end-0 top-50 translate-middle-y me-3"
                                onclick="togglePassword('password')">
                                <i class="fas fa-eye" id="togglePasswordIcon"></i>
                            </button>
                        </div>

                        <!-- Confirm Password -->
                        <div class="form-floating mb-3">
                            <input type="password" class="form-control" id="confirmPassword" name="confirm_password"
                                placeholder="Confirm Password" required>
                            <label for="confirmPassword"><i class="fas fa-lock me-2 text-primary"></i>Confirm
                                Password</label>
                            <button type="button"
                                class="btn btn-sm btn-link position-absolute end-0 top-50 translate-middle-y me-3"
                                onclick="togglePassword('confirmPassword')">
                                <i class="fas fa-eye" id="toggleConfirmPasswordIcon"></i>
                            </button>
                        </div>

                        <!-- Password Strength Meter -->
                        <div class="password-strength mb-3">
                            <div class="d-flex justify-content-between mb-1">
                                <span class="small">Password strength:</span>
                                <span class="small fw-bold" id="passwordStrength">Weak</span>
                            </div>
                            <div class="progress" style="height: 5px;">
                                <div class="progress-bar" id="passwordStrengthBar" role="progressbar"
                                    style="width: 0%;"></div>
                            </div>
                        </div>

                        <!-- Terms & Conditions -->
                        <div class="form-check mb-4">
                            <input class="form-check-input" type="checkbox" id="terms" name="terms" required>
                            <label class="form-check-label small" for="terms">
                                I agree to the <a href="#" class="text-primary text-decoration-none">Terms &
                                    Conditions</a> and
                                <a href="#" class="text-primary text-decoration-none">Privacy Policy</a>
                            </label>
                        </div>

                        <!-- Register Button -->
                        <button type="submit" class="btn btn-primary w-100 py-3 mb-3 fw-bold">
                            <i class="fas fa-user-plus me-2"></i>Create Account
                        </button>

                        <!-- Login Link -->
                        <div class="text-center">
                            <p class="mb-0">Already have an account?
                                <a href="{% url 'login' %}" class="text-primary fw-bold text-decoration-none">
                                    Login <i class="fas fa-arrow-right ms-1"></i>
                                </a>
                            </p>
                        </div>
                    </form>
                </div>

                <!-- Benefits -->
                <div class="card-footer bg-light border-0 py-4">
                    <div class="row text-center">
                        <div class="col-4">
                            <i class="fas fa-truck fa-2x text-primary mb-2"></i>
                            <span class="d-block small">Free Shipping</span>
                        </div>
                        <div class="col-4">
                            <i class="fas fa-tag fa-2x text-primary mb-2"></i>
                            <span class="d-block small">Best Offers</span>
                        </div>
                        <div class="col-4">
                            <i class="fas fa-shield-alt fa-2x text-primary mb-2"></i>
                            <span class="d-block small">Secure</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
